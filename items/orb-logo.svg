<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg" style="background:transparent">
  <defs>
    <!-- Outer glow halo (very soft, wide) -->
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#7B6FE8" stop-opacity="0.18"/>
      <stop offset="40%" stop-color="#6B5FD8" stop-opacity="0.10"/>
      <stop offset="70%" stop-color="#5548C4" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#4438B0" stop-opacity="0"/>
    </radialGradient>

    <!-- Ring glow (diffused ring bloom) -->
    <radialGradient id="ringGlow" cx="50%" cy="50%" r="50%">
      <stop offset="50%" stop-color="#7B6FE8" stop-opacity="0"/>
      <stop offset="68%" stop-color="#8B7FF8" stop-opacity="0.35"/>
      <stop offset="75%" stop-color="#9B8FFF" stop-opacity="0.55"/>
      <stop offset="82%" stop-color="#8B7FF8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7B6FE8" stop-opacity="0"/>
    </radialGradient>

    <!-- Core orb gradient (dark center → mid purple) -->
    <radialGradient id="coreGrad" cx="42%" cy="38%" r="58%">
      <stop offset="0%"  stop-color="#7B70CC"/>
      <stop offset="40%" stop-color="#5448A8"/>
      <stop offset="75%" stop-color="#2E2568"/>
      <stop offset="100%" stop-color="#1A1540"/>
    </radialGradient>

    <!-- Core inner light reflection -->
    <radialGradient id="coreSheen" cx="35%" cy="30%" r="50%">
      <stop offset="0%"  stop-color="#A89EFF" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#7B70CC" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#5448A8" stop-opacity="0"/>
    </radialGradient>

    <!-- Feathered ring mask for blurred ring effect -->
    <filter id="blur-sm" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
    <filter id="blur-xs" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5"/>
    </filter>
    <filter id="blur-md" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14"/>
    </filter>
    <filter id="blur-lg" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="28"/>
    </filter>
  </defs>

  <!-- Wide ambient halo background -->
  <circle cx="150" cy="150" r="148" fill="url(#halo)"/>

  <!-- Outer diffuse glow bloom (large blurred ring) -->
  <circle cx="150" cy="150" r="106" fill="none" stroke="#7B6FE8" stroke-width="28" opacity="0.13" filter="url(#blur-lg)"/>

  <!-- Mid diffuse ring bloom -->
  <circle cx="150" cy="150" r="106" fill="none" stroke="#8B7FF8" stroke-width="14" opacity="0.25" filter="url(#blur-md)"/>

  <!-- Soft inner ring bloom -->
  <circle cx="150" cy="150" r="106" fill="none" stroke="#9B8FFF" stroke-width="6" opacity="0.4" filter="url(#blur-sm)"/>

  <!-- Crisp ring line -->
  <circle cx="150" cy="150" r="106" fill="none" stroke="#8B80F0" stroke-width="1.8" opacity="0.9"/>

  <!-- Ring local glow fill (radial over ring area) -->
  <circle cx="150" cy="150" r="148" fill="url(#ringGlow)"/>

  <!-- Core orb glow halo -->
  <circle cx="150" cy="150" r="44" fill="#6055BB" opacity="0.22" filter="url(#blur-md)"/>
  <circle cx="150" cy="150" r="38" fill="#7065CC" opacity="0.35" filter="url(#blur-sm)"/>

  <!-- Core orb body -->
  <circle cx="150" cy="150" r="33" fill="url(#coreGrad)"/>

  <!-- Core orb sheen / highlight -->
  <circle cx="150" cy="150" r="33" fill="url(#coreSheen)"/>

  <!-- Core orb crisp edge -->
  <circle cx="150" cy="150" r="33" fill="none" stroke="#8078CC" stroke-width="0.8" opacity="0.7"/>

  <!-- Subtle specular highlight dot -->
  <ellipse cx="141" cy="140" rx="8" ry="6" fill="white" opacity="0.12"/>
</svg>
